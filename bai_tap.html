<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bài tập mảng</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="bai_tap.js"></script>
    <style>
        body {
            font-family: monospace;
        }

        .sec {
            border: 1px solid #000;        
            border-left: 3px solid #555;   
            background: transparent;        
            white-space: pre-wrap;
            line-height: 1.8;
            border-radius: 4px;            
        }
    </style>
</head>

<body class="p-4 bg-white text-dark">
    <h2 class="fs-6 fw-bold mb-3">Bài tập mảng</h2>
    <div class="d-flex align-items-center gap-3 flex-wrap mb-4">
        <label class="d-flex align-items-center gap-1 form-label mb-0 fs-6">
            Bài 4 – Tìm x =
            <input type="number" id="x-search" value="42" min="1" max="100" class="form-control form-control-sm"
                style="width: 70px;">
        </label>
        <label class="d-flex align-items-center gap-1 form-label mb-0 fs-6">
            Bài 5 – Tứ phân vị của x =
            <input type="number" id="x-quartile" value="50" min="1" max="100" class="form-control form-control-sm"
                style="width: 70px;">
        </label>
        <button class="btn btn-secondary btn-sm" onclick="run()">
            ▶ Chạy / Tạo mảng mới
        </button>
    </div>
    <div id="output"></div>
</body>
</html>
