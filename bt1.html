<!DOCTYPE html>
<html lang="vi">

<head>
    <title>Live Tile - BT1 </title>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.5.1/dist/jquery.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.min.js"></script>
    <link rel="stylesheet" href="bt1.css">
</head>

<body>

    <header class="site-header"></header>

    <main class="container-fluid p-0">
        <div class="row no-gutters">
            <div class="col-2 p-2">
                <div class="tile lime"></div>
            </div>
            <div class="col-2 p-2">
                <div class="tile sky"></div>
            </div>
            <div class="col-4 p-2">
                <div class="tile lavender"></div>
            </div>
            <div class="col-2 p-2">
                <div class="tile purple"></div>
            </div>
            <div class="col-2 p-2">
                <div class="tile teal"></div>
            </div>
        </div>

        <div class="row no-gutters">
            <div class="col-2 p-2">
                <div class="tile green"></div>
            </div>
            <div class="col-2 p-2">
                <div class="tile lavender"></div>
            </div>
            <div class="col-2 p-2">
                <div class="tile red"></div>
            </div>
            <div class="col-2 p-2">
                <div class="tile yellow"></div>
            </div>
            <div class="col-4 p-2">
                <div class="tile yellow-green"></div>
            </div>
        </div>

        <div class="row no-gutters">
            <div class="col-2 p-2">
                <div class="tile peach"></div>
            </div>
            <div class="col-2 p-2">
                <div class="tile gray"></div>
            </div>
            <div class="col-4 p-2">
                <div class="tile navy"></div>
            </div>
            <div class="col-2 p-2">
                <div class="tile light-blue"></div>
            </div>
            <div class="col-2 p-2">
                <div class="tile teal-dark"></div>
            </div>
        </div>
    </main>

    <footer class="site-footer"></footer>

</body>

</html>
